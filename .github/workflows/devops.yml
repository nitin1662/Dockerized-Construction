name: Roomzy CI/CD

on:
  push:
    branches: [ "main" ]

jobs:
  build-push-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Get code
      - uses: actions/checkout@v3

      # 2. Login to Docker Hub
      - name: Docker Login
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      # 3. Build image
      - name: Build Image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/roomzy:latest .

      # 4. Push image
      - name: Push Image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/roomzy:latest

      # 5. Deploy to EC2 (ONLY pull + restart)
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            docker stop roomzy || true
            docker rm roomzy || true

            docker pull ${{ secrets.DOCKER_USERNAME }}/roomzy:latest

            docker run -d -p 5000:5000 --name roomzy ${{ secrets.DOCKER_USERNAME }}/roomzy:latest